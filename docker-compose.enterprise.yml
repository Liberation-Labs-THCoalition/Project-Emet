# EMET ENTERPRISE DEPLOYMENT — newsroom server infrastructure (256GB+ RAM)
#
# Usage: docker compose -f docker-compose.yml -f docker-compose.enterprise.yml up -d
#
# Models:
#   Powerful: Qwen3 235B-A22B MoE (142GB) — 235B total, 22B active per token.
#             Frontier-class reasoning at local-model speed. Investigative
#             chain analysis, complex financial flow tracing, multi-jurisdiction
#             corporate structure reasoning. This is the model OCCRP journalists
#             would otherwise need a cloud API for — running on your own metal.
#
#   Balanced: Qwen3.5 27B dense (17GB) — all 27.8B params active. Fast
#             turnaround for mid-complexity queries, document analysis,
#             sanctions screening. Can serve multiple investigators concurrently.
#
#   Fast:     Qwen3 8B (6GB) — entity extraction, classification, NER.
#             Sub-second responses for pipeline preprocessing.
#
# RAM: ~170GB for models + ~16GB for services + OS headroom.
#       Runs comfortably on 256GB. For 512GB+ systems, increase Ollama's
#       OLLAMA_NUM_PARALLEL for concurrent model serving.
#
# No data leaves the machine. No cloud APIs. Full audit trail.

services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      OLLAMA_NUM_PARALLEL: "4"
      OLLAMA_MAX_LOADED_MODELS: "3"
    deploy:
      resources:
        reservations:
          memory: 200G
    restart: unless-stopped

  ollama-setup:
    image: ollama/ollama:latest
    depends_on:
      - ollama
    restart: "no"
    entrypoint: >
      sh -c "
        sleep 10 &&
        echo 'Pulling Qwen3 235B MoE (~142GB) — this will take a while on first run...' &&
        ollama pull hf.co/mradermacher/Qwen3-235B-A22B-abliterated-i1-GGUF:Q4_K_M &&
        ollama pull qwen3.5:27b &&
        ollama pull qwen3:8b &&
        echo 'Enterprise models ready — 235B MoE + 27B dense + 8B fast'
      "
    environment:
      OLLAMA_HOST: http://ollama:11434

  engine:
    environment:
      LLM_PROVIDER: ollama
      LLM_FALLBACK_ENABLED: "false"
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODELS: '{"fast": "qwen3:8b", "balanced": "qwen3.5:27b", "powerful": "hf.co/mradermacher/Qwen3-235B-A22B-abliterated-i1-GGUF:Q4_K_M"}'
      OLLAMA_TIMEOUT: "300"
      ANTHROPIC_API_KEY: ""
    depends_on:
      - ollama

  mcp:
    environment:
      LLM_PROVIDER: ollama
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODELS: '{"fast": "qwen3:8b", "balanced": "qwen3.5:27b", "powerful": "hf.co/mradermacher/Qwen3-235B-A22B-abliterated-i1-GGUF:Q4_K_M"}'

volumes:
  ollama_models:
