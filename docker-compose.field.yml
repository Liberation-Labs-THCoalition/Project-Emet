# EMET FIELD DEPLOYMENT — laptop / Mac Mini (24-32GB RAM)
#
# Usage: docker compose -f docker-compose.yml -f docker-compose.field.yml up -d
#
# Models: Qwen3 14B (reasoning) + Qwen3 8B (extraction)
# RAM: ~20GB for models + ~4GB for services
# No data leaves the machine. No cloud APIs.

services:
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped

  ollama-setup:
    image: ollama/ollama:latest
    depends_on:
      - ollama
    restart: "no"
    entrypoint: >
      sh -c "
        sleep 5 &&
        ollama pull qwen3:14b &&
        ollama pull qwen3:8b &&
        echo 'Field models ready — qwen3:14b (9GB) + qwen3:8b (6GB)'
      "
    environment:
      OLLAMA_HOST: http://ollama:11434

  engine:
    environment:
      LLM_PROVIDER: ollama
      LLM_FALLBACK_ENABLED: "false"
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODELS: '{"fast": "qwen3:8b", "balanced": "qwen3:14b", "powerful": "qwen3:14b"}'
      ANTHROPIC_API_KEY: ""
    depends_on:
      - ollama

  mcp:
    environment:
      LLM_PROVIDER: ollama
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODELS: '{"fast": "qwen3:8b", "balanced": "qwen3:14b", "powerful": "qwen3:14b"}'

volumes:
  ollama_models:
